<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        h2 {
            margin-top: 0;
            color: #34d399;
            font-size: 18px;
        }

        .status {
            margin-bottom: 15px;
            font-size: 13px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #startBtn {
            background: #10b981;
            color: #064e3b;
        }

        #startBtn:hover {
            background: #34d399;
        }

        #stopBtn {
            background: #ef4444;
            color: white;
            display: none;
        }

        #stopBtn:hover {
            background: #f87171;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <h2>VELOX Monitor</h2>
    <div id="status" class="status">Ready to monitor</div>

    <div id="inputs">
        <input type="text" id="studentId" placeholder="Student ID (Number)" />
        <input type="text" id="classId" placeholder="Class ID (Number)" />
    </div>

    <button id="startBtn">Start Monitoring</button>
    <button id="stopBtn">Stop Monitoring</button>

    <script src="popup.js"></script>
</body>

</html>
